name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application
        shell: pwsh
        run: .\build.ps1

      - name: Optionally sign executable
        if: ${{ secrets.SIGN_CERT_BASE64 != '' && secrets.SIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.SIGN_CERT_BASE64 }}"))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            throw "signtool.exe not found on runner."
          }

          & $signtool sign `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /f $certPath `
            /p "${{ secrets.SIGN_CERT_PASSWORD }}" `
            ReplayFirewallTool.exe

      - name: Create checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash ReplayFirewallTool.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ReplayFirewallTool.exe" | Set-Content ReplayFirewallTool.exe.sha256 -Encoding ascii

      - name: Package release zip
        shell: pwsh
        run: |
          Compress-Archive -Path ReplayFirewallTool.exe, KULLANIM.txt -DestinationPath ReplayFirewallTool-release.zip -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ReplayFirewallTool.exe
            ReplayFirewallTool.exe.sha256
            ReplayFirewallTool-release.zip
            KULLANIM.txt
